<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Recommender System</title>

    <!-- Bootstrap 3 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css">

    <style>
        body{
            background-color:black;
        }

        .text-white{
            color:white;
        }

        /* Fix empty space problem */
        .book-img{
            height:250px;
            width:100%;
            object-fit:cover;
        }

        .panel{
            background-color:#111;
            border:none;
        }

        .panel-body{
            padding:15px;
        }

        .navbar a{
            color:white !important;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar" style="background-color:#00a65a">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand text-white">My Book Recommender</a>
            </div>

            <ul class="nav navbar-nav">
                <li><a href="/">Home</a></li>
                <li><a href="/recommend">Recommend</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container">

        <div class="row">
            <div class="col-md-12">
                <h1 class="text-white" style="font-size:50px">
                    Recommend Books
                </h1>

                <form action="/recommend_books" method="post">
                    <input name="user_input"
                           type="text"
                           class="form-control"
                           placeholder="Enter book name">
                    <br>
                    <input type="submit"
                           class="btn btn-lg btn-warning"
                           value="Recommend">
                </form>
            </div>
        </div>

        <!-- Recommended Books -->
        <div class="row">

            {% if data %}

            {% for i in data %}
            <div class="col-md-3" style="margin-top:30px">
                <div class="panel panel-default">
                    <div class="panel-body text-center">

                        <img class="book-img" src="{{ i[2] }}" alt="Book Image">

                        <h4 class="text-white">{{ i[0] }}</h4>
                        <p class="text-white">{{ i[1] }}</p>

                    </div>
                </div>
            </div>
            {% endfor %}

            {% endif %}

        </div>

    </div>

</body>
</html>
